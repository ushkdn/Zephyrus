services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  zephyrus.identity.database:
    image: postgres:latest
    container_name: zephyrus.identity.database
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: zephyrus.identity.database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - zephyrus.identity.database.data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zephyrus.catalog.database:
    image: postgres:latest
    container_name: zephyrus.catalog.database
    ports:
      - 5434:5432
    environment:
      POSTGRES_DB: zephyrus.catalog.database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - zephyrus.catalog.database.data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zephyrus.supplier.database:
    image: postgres:latest
    container_name: zephyrus.supplier.database
    ports:
      - 5435:5432
    environment:
      POSTGRES_DB: zephyrus.supplier.database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - zephyrus.supplier.database.data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zephyrus.procurement.database:
    image: postgres:latest
    container_name: zephyrus.procurement.database
    ports:
      - 5436:5432
    environment:
      POSTGRES_DB: zephyrus.procurement.database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - zephyrus.procurement.database.data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zephyrus.notification.database:
    image: postgres:latest
    container_name: zephyrus.notification.database
    ports:
      - 5437:5432
    environment:
      POSTGRES_DB: zephyrus.notification.database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - zephyrus.notification.database.data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis.data:/data



  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq.data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  seq:
    image: datalust/seq:2024
    container_name: seq
    ports:
      - 5051:80
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq.data:/var/lib/seq/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - 5052:80
    environment:
      PGADMIN_DEFAULT_EMAIL: default@gmail.com
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - pgadmin.data:/var/lib/pgadmin/data
    depends_on:
      - zephyrus.identity.database
      - zephyrus.catalog.database
      - zephyrus.supplier.database
      - zephyrus.procurement.database
      - zephyrus.notification.database

  # ─── Microservices ──────────────────────────────────────────────────────────

  zephyrus.identity:
    build:
      context: .
      dockerfile: Zephyrus.Identity/Zephyrus.Identity.WebApi/Dockerfile
    container_name: zephyrus.identity
    env_file:
      - .env.production
      - .env.shared.production
    ports:
      - 7002:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      zephyrus.identity.database:
        condition: service_healthy

  zephyrus.catalog:
    build:
      context: .
      dockerfile: Zephyrus.Catalog/Zephyrus.Catalog.WebApi/Dockerfile
    container_name: zephyrus.catalog
    env_file:
      - .env.production
      - .env.shared.production
    ports:
      - 7000:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      zephyrus.catalog.database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  zephyrus.supplier:
    build:
      context: .
      dockerfile: Zephyrus.Supplier/Zephyrus.Supplier.WebApi/Dockerfile
    container_name: zephyrus.supplier
    env_file:
      - .env.production
      - .env.shared.production
    ports:
      - 7005:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      zephyrus.supplier.database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  zephyrus.procurement:
    build:
      context: .
      dockerfile: Zephyrus.Procurement/Zephyrus.Procurement.WebApi/Dockerfile
    container_name: zephyrus.procurement
    env_file:
      - .env.production
      - .env.shared.production
    ports:
      - 7004:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      zephyrus.procurement.database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  zephyrus.notification:
    build:
      context: .
      dockerfile: Zephyrus.Notification/Zephyrus.Notification.WebApi/Dockerfile
    container_name: zephyrus.notification
    env_file:
      - .env.production
      - .env.shared.production
    ports:
      - 7003:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      zephyrus.notification.database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  zephyrus.gateway:
    build:
      context: .
      dockerfile: Zephyrus.Gateway/Zephyrus.Gateway.WebApi/Dockerfile
    container_name: zephyrus.gateway
    env_file:
      - .env.production
      - .env.shared.production
    ports:
      - 7001:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - zephyrus.identity
      - zephyrus.catalog
      - zephyrus.supplier
      - zephyrus.procurement
      - zephyrus.notification

  zephyrus.ui:
    build:
      context: ../../Zephyrus.UI
      dockerfile: Dockerfile
    container_name: zephyrus.ui
    ports:
      - 3000:80
    depends_on:
      - zephyrus.gateway

volumes:
  zephyrus.identity.database.data:
  zephyrus.catalog.database.data:
  zephyrus.supplier.database.data:
  zephyrus.procurement.database.data:
  zephyrus.notification.database.data:
  rabbitmq.data:
  pgadmin.data:
  redis.data:
  seq.data:
