services:
  zephyrus.identity.database:
    image: postgres:latest
    container_name: zephyrus.identity.database
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: zephyrus.identity.database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - zephyrus.identity.database.data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - 5050:80
    environment:
      PGADMIN_DEFAULT_EMAIL: default@gmail.com
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - pgadmin.data:/var/lib/pgadmin/data
    depends_on:
      - zephyrus.identity.database

  seq:
    image: datalust/seq:2024
    container_name: seq
    ports:
      - 5051:80
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq.data:/var/lib/seq/data

volumes:
  zephyrus.identity.database.data:
  pgadmin.data:
  seq.data:
